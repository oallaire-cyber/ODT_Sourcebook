context_edges:
  exploits:
    label: Exploits
    neo4j_type: EXPLOITS
    description: Attacker exploits an entry point (initial compromise)
    from_node: attacker
    to_node: entry_point
    color: '#c0392b'
    line_style: dashed
    bidirectional: false
    properties:
    - name: success_probability
      type: float
      required: false
      default: null
      description: Attack success probability
  compromises:
    label: Compromises (lateral movement)
    neo4j_type: COMPROMISES
    description: Lateral movement from the entry point to the final technical target
    from_node: entry_point
    to_node: technical_perimeter
    color: '#922b21'
    line_style: dashed
    bidirectional: false
    properties:
    - name: technique
      type: string
      required: false
      default: null
      description: Lateral-movement technique / TTP
  exposes:
    label: Exposes (target → scenario)
    neo4j_type: EXPOSES
    description: Compromise of the technical target realises a loss scenario
    from_node: technical_perimeter
    to_node: scenario
    color: '#e67e22'
    line_style: solid
    bidirectional: false
    properties: []
  affects:
    label: Affects (scenario → perimeter)
    neo4j_type: AFFECTS
    description: A loss scenario affects a business (P&L) perimeter
    from_node: scenario
    to_node: business_perimeter
    color: '#d35400'
    line_style: solid
    bidirectional: false
    properties: []
  concerns:
    label: Concerns (risk → asset)
    neo4j_type: CONCERNS
    description: An operational risk covers / concerns a technical context element
    from_node: risk
    to_node: technical_perimeter
    color: '#7f8c8d'
    line_style: dotted
    bidirectional: false
    properties: []
  impacts_tpo:
    label: Impacts Programme Objective
    neo4j_type: IMPACTS_TPO
    description: Risk impacts a Top Programme Objective (TPO)
    from_node: risk
    to_node: tpo
    color: '#3498db'
    line_style: solid
    bidirectional: false
    properties:
    - name: impact_level
      type: string
      required: false
      default: null
      description: Severity of the risk's impact on the objective
    - name: description
      type: string
      required: false
      default: null
      description: Free-form description of the impact
  impacts_tco:
    label: Impacts Company Objective
    neo4j_type: IMPACTS_TCO
    description: Risk impacts a Top Company Objective (TCO)
    from_node: risk
    to_node: tco
    color: '#2980b9'
    line_style: solid
    bidirectional: false
    properties:
    - name: impact_level
      type: string
      required: false
      default: null
      description: Severity of the risk's impact on the objective
    - name: description
      type: string
      required: false
      default: null
      description: Free-form description of the impact
  contributes_to:
    label: Contributes To (Programme → Company)
    neo4j_type: CONTRIBUTES_TO
    description: A programme objective (TPO) rolls up to a company objective (TCO)
    from_node: tpo
    to_node: tco
    color: '#16a085'
    line_style: solid
    bidirectional: false
    properties: []
  instantiates:
    label: Instantiates
    neo4j_type: INSTANTIATES
    description: Links a GenericRisk template to a specific risk instantiation
    from_node: risk
    to_node: risk
    color: '#9b59b6'
    line_style: dashed
    bidirectional: false
    properties: []
  manages:
    label: Manages
    neo4j_type: MANAGES
    description: A sponsor manages / tasks an attacker
    from_node: sponsor
    to_node: attacker
    color: '#641e16'
    line_style: solid
    bidirectional: false
    properties: []
  seeks:
    label: Seeks (attack motive)
    neo4j_type: SEEKS
    description: The sponsor's motive — the functional target it wants
    from_node: sponsor
    to_node: functional_target
    color: '#922b21'
    line_style: dotted
    bidirectional: false
    properties: []
  targets:
    label: Targets
    neo4j_type: TARGETS
    description: An attacker targets a technical asset
    from_node: attacker
    to_node: technical_perimeter
    color: '#a93226'
    line_style: dashed
    bidirectional: false
    properties: []
  uses:
    label: Uses
    neo4j_type: USES
    description: A business perimeter runs a business activity
    from_node: business_perimeter
    to_node: business_activity
    color: '#117a65'
    line_style: solid
    bidirectional: false
    properties: []
  produces:
    label: Produces
    neo4j_type: PRODUCES
    description: A business activity produces a functional target (e.g. design data)
    from_node: business_activity
    to_node: functional_target
    color: '#148f77'
    line_style: solid
    bidirectional: false
    properties: []
  hosted_on:
    label: Hosted On
    neo4j_type: HOSTED_ON
    description: A functional target is hosted on a technical asset
    from_node: functional_target
    to_node: technical_perimeter
    color: '#5d6d7e'
    line_style: solid
    bidirectional: false
    properties: []
  illustrates:
    label: Illustrates (scenario → business risk)
    neo4j_type: ILLUSTRATES
    description: SPICE scenario is a concrete instantiation of how this Business Risk
      materialises. Primary bridge between the SPICE and graph layers. App enforces
      target = business-level risk.
    from_node: spice_scenario
    to_node: risk
    color: '#a93226'
    line_style: solid
    bidirectional: false
    core: true
    properties: []
  caused_by:
    label: Caused By (scenario → operational risk)
    neo4j_type: CAUSED_BY
    description: The scenario's cause is an existing Operational Risk in the causal
      graph. App enforces target = operational-level risk.
    from_node: spice_scenario
    to_node: risk
    color: '#cb4335'
    line_style: dashed
    bidirectional: false
    properties: []
  assessed_against:
    label: Assessed Against (scenario → P&L perimeter)
    neo4j_type: ASSESSED_AGAINST
    description: The financial impact of this scenario is assessed on this P&L perimeter.
    from_node: spice_scenario
    to_node: business_perimeter
    color: '#d35400'
    line_style: solid
    bidirectional: false
    core: true
    properties: []
  occurs_at:
    label: Occurs At (scenario → technical perimeter)
    neo4j_type: OCCURS_AT
    description: The triggering event physically occurs at this asset or site.
    from_node: spice_scenario
    to_node: technical_perimeter
    color: '#e67e22'
    line_style: solid
    bidirectional: false
    properties: []
  contains:
    label: Contains (perimeter → business risk)
    neo4j_type: CONTAINS
    description: This P&L perimeter contains this Business Risk — defines financial
      scope membership. App enforces target = business-level risk.
    from_node: business_perimeter
    to_node: risk
    color: '#9b59b6'
    line_style: solid
    bidirectional: false
    core: true
    properties: []
  addresses:
    label: Addresses (scenario → objective)
    neo4j_type: ADDRESSES
    description: The scenario declares a mitigation objective to be fulfilled.
    from_node: spice_scenario
    to_node: mitigation_objective
    color: '#1abc9c'
    line_style: solid
    bidirectional: false
    core: true
    properties: []
  fulfils:
    label: Fulfils (SPICE mitigation → objective)
    neo4j_type: FULFILS
    description: A SPICE mitigation fulfils an objective with a declared contribution
      weight. Sum of weights per objective MAY exceed 100% (surfaced as over-coverage,
      not an error).
    from_node: spice_mitigation
    to_node: mitigation_objective
    color: '#148f77'
    line_style: solid
    bidirectional: false
    core: true
    properties:
    - name: contribution_weight
      type: float
      required: false
      default: null
      description: This mitigation's contribution to the objective (% — may sum >100
        per objective)
  mitigated_by_spice:
    label: Mitigated By SPICE (scenario → SPICE mitigation)
    neo4j_type: MITIGATED_BY_SPICE
    description: A financial/operational control reduces the consequence of this scenario.
      Does NOT affect graph exposure.
    from_node: spice_scenario
    to_node: spice_mitigation
    color: '#16a085'
    line_style: solid
    bidirectional: false
    core: true
    properties: []
  stewards:
    label: Stewards (owner → mitigation)
    neo4j_type: STEWARDS
    description: Execution accountability ("I am doing this work"). Polymorphic target
      Mitigation | SpiceMitigation (declared endpoint = mitigation; app handles SpiceMitigation).
      STEWARDS targeting any Risk node is forbidden by design.
    from_node: owner
    to_node: mitigation
    color: '#7f8c8d'
    line_style: dotted
    bidirectional: false
    core: true
    properties: []
  bears:
    label: Bears (owner → risk)
    neo4j_type: BEARS
    description: 'Polymorphic consequence-bearing: OperationalRisk → technical consequence,
      BusinessRisk → financial consequence. At most one Bearer per risk.'
    from_node: owner
    to_node: risk
    color: '#566573'
    line_style: dotted
    bidirectional: false
    core: true
    properties: []
