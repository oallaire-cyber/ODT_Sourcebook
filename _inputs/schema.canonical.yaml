version: '3.0'
name: HORIZON-LEO Demo
description: 'Full demonstration schema (Orbital Dynamics / HORIZON-LEO): core risk
  model plus context nodes, context edges and analysis scopes.'
entities:
  risk:
    neo4j_label: Risk
    levels:
    - id: business
      label: Business
      description: Consequence-oriented risks managed by program leadership
      color: '#9b59b6'
      shape: diamond
      emoji: ◆
      size: 35
    - id: operational
      label: Operational
      description: Cause-oriented risks managed by functional teams
      color: '#3498db'
      shape: dot
      emoji: ●
      size: 30
    categories:
    - id: programme
      label: Programme
      description: Programme-level risks
      color: '#9b59b6'
    - id: product
      label: Product
      description: Product / engineering risks
      color: '#3498db'
    - id: industrial
      label: Industrial
      description: Industrial / manufacturing risks
      color: '#27ae60'
    - id: supply_chain
      label: Supply Chain
      description: Supply chain and logistics risks
      color: '#e74c3c'
    - id: corporate
      label: Corporate
      description: Corporate / governance risks
      color: '#34495e'
    - id: financial
      label: Financial
      description: Financial and funding risks
      color: '#16a085'
    - id: commercial
      label: Commercial
      description: Commercial / market risks
      color: '#f39c12'
    - id: regulatory
      label: Regulatory
      description: Regulatory and compliance risks
      color: '#c0392b'
    - id: hr
      label: HR
      description: People / organisational risks
      color: '#8e44ad'
    - id: engineering
      label: Engineering
      description: Engineering / technical risks
      color: '#2980b9'
    - id: it
      label: IT
      description: Information-technology risks
      color: '#2c3e50'
    - id: security
      label: Security
      description: Security and threat risks
      color: '#d35400'
    statuses:
    - id: active
      label: Active
      description: Currently active risks
      is_active: true
    - id: contingent
      label: Contingent
      description: Potential risks awaiting activation
      is_active: true
    - id: archived
      label: Archived
      description: Closed or inactive risks
      is_active: false
    - id: accepted
      label: Accepted
      description: Formally accepted; excluded from active exposure analysis
      is_active: false
    - id: watching
      label: Watching
      description: Accepted risk monitored for trigger re-activation
      is_active: false
    - id: suppressed
      label: Suppressed
      description: Exposure dropped below acceptance threshold
      is_active: false
    - id: closed
      label: Closed
      description: Risk condition no longer exists; retained for audit
      is_active: false
    origins:
    - id: new
      label: New
      description: Newly identified risks
    - id: legacy
      label: Legacy
      description: Inherited or historical risks
    attributes:
    - name: name
      type: string
      required: true
      default: null
      description: Risk name
    - name: description
      type: string
      required: false
      default: null
      description: Risk description
    - name: owner
      type: string
      required: false
      default: null
      description: Risk owner
    - name: probability
      type: float
      required: false
      default: null
      description: Likelihood rating (1-10)
      engine_required: true
    - name: severity
      type: float
      required: false
      default: null
      description: Severity rating (1-10) — intrinsic intensity of the risk event
      engine_required: true
    - name: trigger_condition
      type: string
      required: false
      default: null
      description: Condition string that, when met, re-activates a Watching/Suppressed
        risk
    - name: acceptance_date
      type: date
      required: false
      default: null
      description: ISO date when risk was formally accepted
    - name: acceptance_owner
      type: string
      required: false
      default: null
      description: Person who formally accepted the risk
    - name: archive_date
      type: date
      required: false
      default: null
      description: ISO date when risk was archived
    - name: is_template
      type: boolean
      required: false
      default: false
      description: If true, this is a GenericRisk template — excluded from exposure
        calculations and canvas display
    - name: annual_probability
      type: float
      required: false
      default: null
      description: 'Frequency (U16): annual Poisson event rate λ in events/year. Populated by
        analyst direct entry (priority) or the likelihood_to_lambda lookup-table fallback — no
        SPICE dependency. Distinct from the 1–10 likelihood score, which is unchanged and still
        drives exposure.'
    - name: magnitude_point_estimate
      type: float
      required: false
      default: null
      description: 'Magnitude Tier-2 fallback (U18): expert single expected/median loss for this
        Business Risk (perimeter currency), used when no current SPICE coverage exists. Priority:
        SPICE-fitted > this analyst estimate > YAML domain default.'
    - name: magnitude_low
      type: float
      required: false
      default: null
      description: 'Optional P10 (low) loss for the Tier-2 fallback — pairs with magnitude_high to
        shape the distribution tail; if omitted, spread inherits the domain YAML default.'
    - name: magnitude_high
      type: float
      required: false
      default: null
      description: 'Optional P90 (high) loss for the Tier-2 fallback — pairs with magnitude_low to
        shape the distribution tail; if omitted, spread inherits the domain YAML default.'
    custom_attributes: []
    subtypes:
    - id: generic
      label: Generic
      applies_to:
      - business
      - operational
      extension_fields: []
    - id: cyber_entry_point
      label: Cyber — Entry Point-Oriented
      applies_to:
      - operational
      extension_fields:
      - name: entry_point_type
        type: enum
        required: false
        description: Type of entry point being exploited
        values:
        - Network
        - Physical
        - Human
        - Supply Chain
        - Cloud
      - name: exploitation_technique
        type: string
        required: false
        description: Technique or vector used
      - name: detection_difficulty
        type: enum
        required: false
        description: How difficult this attack vector is to detect
        values:
        - Low
        - Medium
        - High
        - Very High
    - id: cyber_target_oriented
      label: Cyber — Target-Oriented
      applies_to:
      - operational
      extension_fields:
      - name: target_type
        type: enum
        required: false
        description: Nature of the targeted asset
        values:
        - Functional Target
        - Technical Target
        - Data Asset
        - Personnel
      - name: threat_actor_category
        type: string
        required: false
        description: Category of threat actor
      - name: attack_objective
        type: string
        required: false
        description: Attacker's primary objective
    - id: supply_chain
      label: Supply Chain / Industrial
      applies_to:
      - operational
      extension_fields:
      - name: supplier_tier
        type: enum
        required: false
        description: Supplier tier in the supply chain
        values:
        - Tier 1
        - Tier 2
        - Tier 3
        - Internal
      - name: criticality_class
        type: enum
        required: false
        description: Criticality classification of the supplier
        values:
        - Critical
        - Important
        - Standard
      - name: single_source
        type: boolean
        required: false
        description: Whether this is a single-source dependency
    - id: engineering_technical
      label: Engineering / Technical
      applies_to:
      - operational
      extension_fields:
      - name: affected_subsystem
        type: string
        required: false
        description: Subsystem or component affected
      - name: qualification_stage
        type: enum
        required: false
        description: Programme stage at which the risk materialises
        values:
        - Design
        - Prototype
        - Test
        - Qualification
        - Production
      - name: failure_mode
        type: string
        required: false
        description: Primary failure mode description
    - id: programme_schedule
      label: Programme / Schedule
      applies_to:
      - business
      - operational
      extension_fields:
      - name: milestone_impacted
        type: string
        required: false
        description: Key milestone at risk
      - name: schedule_buffer_weeks
        type: integer
        required: false
        description: Available schedule buffer in weeks
      - name: workstream
        type: string
        required: false
        description: Affected workstream or work package
    - id: regulatory_compliance
      label: Regulatory / Compliance
      applies_to:
      - business
      - operational
      extension_fields:
      - name: regulatory_body
        type: string
        required: false
        description: Relevant regulatory authority
      - name: applicable_standard
        type: string
        required: false
        description: Standard or regulation reference
      - name: licence_stage
        type: string
        required: false
        description: Current licensing stage
    - id: financial_contractual
      label: Financial / Contractual
      applies_to:
      - business
      - operational
      extension_fields:
      - name: contract_type
        type: enum
        required: false
        description: Type of contract involved
        values:
        - Fixed Price
        - T&M
        - Framework
        - Joint Venture
      - name: penalty_clause
        type: boolean
        required: false
        description: Whether a penalty clause applies
      - name: financial_ceiling_meur
        type: float
        required: false
        description: Financial ceiling in M€
    - id: strategic
      label: Strategic
      applies_to:
      - business
      extension_fields:
      - name: strategic_horizon
        type: enum
        required: false
        description: Time horizon of the strategic risk
        values:
        - Short-term (<1yr)
        - Medium-term (1-3yr)
        - Long-term (>3yr)
      - name: competitive_dimension
        type: string
        required: false
        description: Competitive dimension affected
  mitigation:
    neo4j_label: Mitigation
    types:
    - id: dedicated
      label: Dedicated
      description: Program-specific mitigations
      color: '#27ae60'
      line_style: solid
    - id: inherited
      label: Inherited
      description: Mitigations from other sources
      color: '#3498db'
      line_style: dotted
    - id: baseline
      label: Baseline
      description: Standard or regulatory mitigations
      color: '#9b59b6'
      line_style: thick
    statuses:
    - id: existing
      label: Existing
      description: Implemented and operating
      is_active: true
    - id: on-going
      label: On-Going
      description: In deployment
      is_active: true
    - id: planned
      label: Planned
      description: Decided + budgeted + roadmapped, not yet capitalised
      is_active: true
    - id: recommended
      label: Recommended
      description: Identified gap, not yet decided
      is_active: true
    attributes:
    - name: name
      type: string
      required: true
      default: null
      description: Mitigation name
    - name: description
      type: string
      required: false
      default: null
      description: Mitigation description
    - name: owner
      type: string
      required: false
      default: null
      description: Mitigation owner
    - name: source_entity
      type: string
      required: false
      default: null
      description: Source entity for inherited mitigations
    - name: capex
      type: float
      required: false
      default: null
      description: Capital Expenditure (CAPEX)
    - name: opex
      type: float
      required: false
      default: null
      description: Operational Expenditure (OPEX)
    - name: financial_effect
      type: enum
      required: false
      default: null
      choices:
      - impact_reducing
      - recovery_accelerating
      description: 'Financial-layer effect (CR-01, promoted from SpiceMitigation.type): impact_reducing
        | recovery_accelerating. Nullable (null = operational-only). Decoupled from MITIGATES.'
    - name: committed_budget
      type: float
      required: false
      default: null
      description: Committed spend for a 'planned' control before it is capitalised — distinct from capex/opex.
    - name: target_date
      type: date
      required: false
      default: null
      description: ETA / roadmap date for a 'planned' control.
    - name: roadmap_ref
      type: string
      required: false
      default: null
      description: Free reference to the delivery roadmap / initiative (optional).
    - name: coverage_amount
      type: float
      required: false
      default: null
      description: Insurance limit / contractual cap — carried from SpiceMitigation.
    custom_attributes: []
relationships:
  influences:
    neo4j_type: INFLUENCES
    default_confidence: 0.8
    types:
    - id: level1_op_to_bus
      label: Level1_Op_to_Bus
      description: Operational to Business influence
      color: '#e74c3c'
      line_style: solid
    - id: level2_bus_to_bus
      label: Level2_Bus_to_Bus
      description: Business to Business influence
      color: '#9b59b6'
      line_style: solid
    - id: level3_op_to_op
      label: Level3_Op_to_Op
      description: Operational to Operational influence
      color: '#3498db'
      line_style: dashed
    strengths:
    - id: weak
      label: Weak
      value: 0.25
      description: Possible minor contribution
      color: '#bdc3c7'
    - id: moderate
      label: Moderate
      value: 0.5
      description: Likely contributes
      color: '#f39c12'
    - id: strong
      label: Strong
      value: 0.75
      description: High probability of propagation
      color: '#e67e22'
    - id: critical
      label: Critical
      value: 1.0
      description: Direct, inevitable causation
      color: '#e74c3c'
  mitigates:
    neo4j_type: MITIGATES
    effectiveness_levels:
    - id: low
      label: Low
      reduction: 0.3
      description: Minor risk reduction
    - id: medium
      label: Medium
      reduction: 0.5
      description: Moderate risk reduction
    - id: high
      label: High
      reduction: 0.7
      description: Significant risk reduction
    - id: critical
      label: Critical
      reduction: 0.9
      description: Near-complete risk elimination
analysis:
  exposure:
    base_formula: likelihood * severity
    max_base_value: 100.0
    propagation_decay: 0.85
    convergence_multiplier: 0.2
  cache_timeout_seconds: 30
  max_influence_depth: 10
  high_exposure_threshold_multiplier: 1.2
  alert_thresholds:
    high_exposure_threshold: 50.0
    tail_risk_indicator_threshold: 25.0
    enabled: true
risk_lifecycle_rules:
  acceptance_threshold: 20.0
  severity_ceiling: 7.0
  archive_retention_days: 180
  quadrant_thresholds:
    likelihood_threshold: 6.0
    severity_threshold_frequency: 6.0
    severity_threshold_severity: 7.0
graph_visual_config:
  lifecycle_opacity:
    watching: 0.35
    suppressed: 0.15
    accepted: 0.4
    closed: 0.2
  quadrant_border_encoding: false
  default_preset: analysis
ui:
  app_title: Risk Influence Map (RIM)
  app_icon: 🎯
  layout: wide
  graph_height: 700px
  graph_bgcolor: '#ffffff'
  tabs:
  - id: visualization
    label: Visualization
    icon: 📊
    enabled: true
  - id: risks
    label: Risks
    icon: 🎯
    enabled: true
  - id: tpos
    label: Top Objectives
    icon: 🏆
    enabled: true
  - id: mitigations
    label: Mitigations
    icon: 🛡️
    enabled: true
  - id: influences
    label: Influences
    icon: 🔗
    enabled: true
  - id: analysis
    label: Analysis
    icon: 📈
    enabled: true
  - id: import_export
    label: Import/Export
    icon: 📥
    enabled: true
  - id: context_data
    label: Context Data
    icon: 🧩
    enabled: true
  presets:
  - id: all_elements
    name: 🔍 All Elements
    description: Show all risks, TPOs, and mitigations
    filters:
      risks:
        levels:
        - Business
        - Operational
        categories:
        - Programme
        - Produit
        - Industriel
        - Supply Chain
        statuses:
        - Active
        - Contingent
      tpos:
        enabled: true
      mitigations:
        enabled: true
  - id: risks_only
    name: 🎯 Risks Only
    description: Show only risks and their influences
    filters:
      risks:
        levels:
        - Business
        - Operational
        categories:
        - Programme
        - Produit
        - Industriel
        - Supply Chain
        statuses:
        - Active
        - Contingent
      tpos:
        enabled: false
      mitigations:
        enabled: false
  - id: business_focus
    name: ◆ Business Focus
    description: Focus on business risks only
    filters:
      risks:
        levels:
        - Business
        categories:
        - Programme
        - Produit
        - Industriel
        - Supply Chain
        statuses:
        - Active
        - Contingent
      tpos:
        enabled: true
      mitigations:
        enabled: false
  - id: operational_focus
    name: ● Operational Focus
    description: Focus on operational risks
    filters:
      risks:
        levels:
        - Operational
        categories:
        - Programme
        - Produit
        - Industriel
        - Supply Chain
        statuses:
        - Active
        - Contingent
      tpos:
        enabled: false
      mitigations:
        enabled: true
# Pillar 5 — SPICE Core type (Option B: distinct Neo4j label + core flag, generic CRUD/IO).
# SpiceScenario is read by the financial MagnitudeCalibrator (U18); it is NOT part of graph
# exposure propagation. One of three sibling cases per (scenario_family_id, version_number).
frequency_model:
  curve_type: piecewise_linear
  calibrated: false
  likelihood_to_lambda:
  - score: 1
    label: Exceptional
    central_lambda: 0.003
    return_period_years: 300
  - score: 2
    label: Very rare
    central_lambda: 0.008
    return_period_years: 130
  - score: 3
    label: Rare
    central_lambda: 0.015
    return_period_years: 65
  - score: 4
    label: Unlikely
    central_lambda: 0.035
    return_period_years: 30
  - score: 5
    label: Possible
    central_lambda: 0.075
    return_period_years: 13
  - score: 6
    label: Moderate
    central_lambda: 0.15
    return_period_years: 7
  - score: 7
    label: Likely
    central_lambda: 0.28
    return_period_years: 3.5
  - score: 8
    label: Very likely
    central_lambda: 0.47
    return_period_years: 2
  - score: 9
    label: Probable
    central_lambda: 0.93
    return_period_years: 1
  - score: 10
    label: Near-certain
    central_lambda: 2.0
    return_period_years: 0.5
loss_model:
  frequency_mapping: piecewise_linear
  magnitude_distribution: lognormal
  monte_carlo_runs: 10000
  var_confidence_levels:
  - 0.95
  - 0.99
  - 0.995
  resilience_thresholds:
    robust_exceedance_probability: 0.2
    fragile_exceedance_probability: 0.05
  magnitude_fallback:
    coefficient_of_variation: 1.5
    median: null
additional_entities:
- id: spice_scenario
  label: SPICE Scenario
  neo4j_label: SpiceScenario
  core: true
  description: 'Financially quantified stress-test of how a Business Risk can catastrophically
    materialise (Pillar 5). EBIT/FCF per-year impact trajectories are read by the MagnitudeCalibrator
    (U18). Not part of graph exposure propagation.'
  color: '#a93226'
  shape: triangle
  emoji: 🎯
  size: 32
  attributes:
  - name: name
    type: string
    required: true
    default: null
    description: Scenario name
  - name: description
    type: string
    required: false
    default: null
    description: Narrative description of the scenario
  - name: hypothesis
    type: string
    required: false
    default: null
    description: Assumptions and caveats underpinning this assessment (hypothesis / caveat)
  - name: scenario_family_id
    type: string
    required: true
    default: null
    description: UUID shared by all versions and the three cases of one conceptual scenario
  - name: version_number
    type: integer
    required: true
    default: 1
    min_value: 1
    description: Increments per family on each reassessment
  - name: case_type
    type: enum
    required: true
    default: realistic
    choices:
    - best
    - realistic
    - pessimistic
    description: Which of the three independently-assessed consequence trajectories this is
  - name: assessment_date
    type: date
    required: true
    default: null
    description: Date this case was assessed
  - name: status_in_family
    type: enum
    required: true
    default: draft
    choices:
    - draft
    - current
    - superseded
    description: 'Exactly one ''current'' per family; the MagnitudeCalibrator reads only ''current'''
  - name: cause_description
    type: string
    required: false
    default: null
    description: Description of the triggering cause
  - name: cause_type
    type: enum
    required: false
    default: null
    choices:
    - security
    - climate
    - hazard
    - geopolitical
    - other
    description: Multi-domain cause family
  - name: ebit_impact_y1
    type: float
    required: true
    default: null
    description: EBIT impact in recovery year 1 (perimeter currency)
  - name: ebit_impact_y2
    type: float
    required: false
    default: null
    description: EBIT impact in recovery year 2
  - name: ebit_impact_y3
    type: float
    required: false
    default: null
    description: EBIT impact in recovery year 3
  - name: ebit_impact_y4
    type: float
    required: false
    default: null
    description: EBIT impact in recovery year 4
  - name: ebit_impact_y5
    type: float
    required: false
    default: null
    description: EBIT impact in recovery year 5
  - name: ebit_impact_y6
    type: float
    required: false
    default: null
    description: EBIT impact in recovery year 6 (recovery horizon cap)
  - name: ebit_impact_total
    type: float
    required: true
    default: null
    description: Auto-computed sum of the populated EBIT year fields
  - name: fcf_impact_y1
    type: float
    required: false
    default: null
    description: Cash (FCF) impact in recovery year 1
  - name: fcf_impact_y2
    type: float
    required: false
    default: null
    description: Cash (FCF) impact in recovery year 2
  - name: fcf_impact_y3
    type: float
    required: false
    default: null
    description: Cash (FCF) impact in recovery year 3
  - name: fcf_impact_y4
    type: float
    required: false
    default: null
    description: Cash (FCF) impact in recovery year 4
  - name: fcf_impact_y5
    type: float
    required: false
    default: null
    description: Cash (FCF) impact in recovery year 5
  - name: fcf_impact_y6
    type: float
    required: false
    default: null
    description: Cash (FCF) impact in recovery year 6 (recovery horizon cap)
  - name: fcf_impact_total
    type: float
    required: false
    default: null
    description: Auto-computed sum of the populated FCF year fields
  - name: crisis_management_days
    type: integer
    required: false
    default: null
    description: Crisis-management duration in days
  - name: operational_recovery_days
    type: integer
    required: false
    default: null
    description: Operational recovery duration in days
  - name: financial_recovery_years
    type: integer
    required: true
    default: 1
    min_value: 1
    max_value: 6
    description: Years to financial recovery (1–6); drives which year fields are relevant
  - name: validated
    type: enum
    required: false
    default: proposed
    choices:
    - proposed
    - business
    - technical
    - finance
    - approved
    description: SPICE triple-validation stage progression
  - name: exercise_date
    type: date
    required: false
    default: null
    description: Date of the SPICE exercise that produced this assessment
  - name: exercise_version
    type: string
    required: false
    default: null
    description: Version label of the SPICE exercise

context_nodes:
  business_perimeter:
    label: Business Perimeter
    description: 'Organisational unit holding the P&L that bears the financial consequences
      of a scenario. Core node — ebit_baseline and fcf_baseline are read by the magnitude
      calibrator (U18), per-perimeter LEC aggregation, F15, and F36.

      '
    color: '#8e44ad'
    shape: box
    emoji: 🏢
    size: 35
    zone: upper
    border: double
    properties:
    - name: name
      type: string
      required: true
      default: null
      description: Business unit or perimeter name
    - name: pl_holder
      type: string
      required: false
      default: null
      description: Legal entity or org unit holding the P&L
    - name: ebit_baseline
      type: float
      required: false
      default: null
      description: 'Current AOP EBIT target in the perimeter currency. Reference baseline
        for scenario impact scaling (U18, F15). Replaces legacy ebit_absolute.

        '
    - name: fcf_baseline
      type: float
      required: false
      default: null
      description: 'Current AOP FCF target in the perimeter currency (optional). Replaces
        legacy fcf_annual.

        '
    - name: currency
      type: string
      required: false
      default: EUR
      description: ISO 4217 currency code (e.g. EUR, USD)
    - name: spice_assessed
      type: boolean
      required: false
      default: false
      description: 'Auto-flag: true if at least one SpiceScenario is ASSESSED_AGAINST
        this perimeter. Set by F8 on scenario save; read by F36 coverage heatmap.

        '
    - name: description
      type: string
      required: false
      default: null
      description: Free text description
    - name: division
