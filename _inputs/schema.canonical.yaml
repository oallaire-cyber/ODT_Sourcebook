context_edges:
  exploits:
    label: Exploits
    neo4j_type: EXPLOITS
    description: Attacker exploits an entry point (initial compromise)
    from_node: attacker
    to_node: entry_point
    color: '#c0392b'
    line_style: dashed
    bidirectional: false
    properties:
    - name: success_probability
      type: float
      required: false
      default: null
      description: Attack success probability
  compromises:
    label: Compromises (lateral movement)
    neo4j_type: COMPROMISES
    description: Lateral movement from the entry point to the final technical target
    from_node: entry_point
    to_node: technical_perimeter
    color: '#922b21'
    line_style: dashed
    bidirectional: false
    properties:
    - name: technique
      type: string
      required: false
      default: null
      description: Lateral-movement technique / TTP
  exposes:
    label: Exposes (target → scenario)
    neo4j_type: EXPOSES
    description: Compromise of the technical target realises a loss scenario
    from_node: technical_perimeter
    to_node: scenario
    color: '#e67e22'
    line_style: solid
    bidirectional: false
    properties: []
  affects:
    label: Affects (scenario → perimeter)
    neo4j_type: AFFECTS
    description: A loss scenario affects a business (P&L) perimeter
    from_node: scenario
    to_node: business_perimeter
    color: '#d35400'
    line_style: solid
    bidirectional: false
    properties: []
  concerns:
    label: Concerns (risk → asset)
    neo4j_type: CONCERNS
    description: An operational risk covers / concerns a technical context element
    from_node: risk
    to_node: technical_perimeter
    color: '#7f8c8d'
    line_style: dotted
    bidirectional: false
    properties: []
  impacts_tpo:
    label: Impacts Programme Objective
    neo4j_type: IMPACTS_TPO
    description: Risk impacts a Top Programme Objective (TPO)
    from_node: risk
    to_node: tpo
    color: '#3498db'
    line_style: solid
    bidirectional: false
    properties:
    - name: impact_level
      type: string
      required: false
      default: null
      description: Severity of the risk's impact on the objective
    - name: description
      type: string
      required: false
      default: null
      description: Free-form description of the impact
  impacts_tco:
    label: Impacts Company Objective
    neo4j_type: IMPACTS_TCO
    description: Risk impacts a Top Company Objective (TCO)
    from_node: risk
    to_node: tco
    color: '#2980b9'
    line_style: solid
    bidirectional: false
    properties:
    - name: impact_level
      type: string
      required: false
      default: null
      description: Severity of the risk's impact on the objective
    - name: description
      type: string
      required: false
      default: null
      description: Free-form description of the impact
  contributes_to:
    label: Contributes To (Programme → Company)
    neo4j_type: CONTRIBUTES_TO
    description: A programme objective (TPO) rolls up to a company objective (TCO)
    from_node: tpo
    to_node: tco
    color: '#16a085'
    line_style: solid
    bidirectional: false
    properties: []
  instantiates:
    label: Instantiates
    neo4j_type: INSTANTIATES
    description: Links a GenericRisk template to a specific risk instantiation
    from_node: risk
    to_node: risk
    color: '#9b59b6'
    line_style: dashed
    bidirectional: false
    properties: []
  manages:
    label: Manages
    neo4j_type: MANAGES
    description: A sponsor manages / tasks an attacker
    from_node: sponsor
    to_node: attacker
    color: '#641e16'
    line_style: solid
    bidirectional: false
    properties: []
  seeks:
    label: Seeks (attack motive)
    neo4j_type: SEEKS
    description: The sponsor's motive — the functional target it wants
    from_node: sponsor
    to_node: functional_target
    color: '#922b21'
    line_style: dotted
    bidirectional: false
    properties: []
  targets:
    label: Targets
    neo4j_type: TARGETS
    description: An attacker targets a technical asset
    from_node: attacker
    to_node: technical_perimeter
    color: '#a93226'
    line_style: dashed
    bidirectional: false
    properties: []
  uses:
    label: Uses
    neo4j_type: USES
    description: A business perimeter runs a business activity
    from_node: business_perimeter
    to_node: business_activity
    color: '#117a65'
    line_style: solid
    bidirectional: false
    properties: []
  produces:
    label: Produces
    neo4j_type: PRODUCES
    description: A business activity produces a functional target (e.g. design data)
    from_node: business_activity
    to_node: functional_target
    color: '#148f77'
    line_style: solid
    bidirectional: false
    properties: []
  hosted_on:
    label: Hosted On
    neo4j_type: HOSTED_ON
    description: A functional target is hosted on a technical asset
    from_node: functional_target
    to_node: technical_perimeter
    color: '#5d6d7e'
    line_style: solid
    bidirectional: false
    properties: []
  # --- CR-02 — External-entity edges (all displayable context; none enter L×S propagation) ---
  supplies:
    label: Supplies (supplier → activity)
    neo4j_type: SUPPLIES
    description: 'A supplier provides an input into a business activity (CR-02). Blast-radius
      into the production chain. Context — no propagation math.'
    from_node: supplier
    to_node: business_activity
    color: '#af601a'
    line_style: solid
    bidirectional: false
    properties: []
  governs:
    label: Governs (regulator → risk)
    neo4j_type: GOVERNS
    description: 'A regulator/regime governs a risk (CR-02). Enables portfolio
      regulatory-exposure queries. Context — no propagation math.'
    from_node: regulator
    to_node: risk
    color: '#6c3483'
    line_style: dotted
    bidirectional: false
    properties: []
  sourced_from:
    label: Sourced From (risk → supplier)
    neo4j_type: SOURCED_FROM
    description: 'A supply-chain risk is sourced from / tied to a supplier (CR-02).
      Context — no propagation math.'
    from_node: risk
    to_node: supplier
    color: '#af601a'
    line_style: dashed
    bidirectional: false
    properties: []
  # --- Pillar 5 — SPICE relationships (all displayable context; none enter L×S propagation) ---
  illustrates:
    label: Illustrates (scenario → business risk)
    neo4j_type: ILLUSTRATES
    core: true
    description: 'SPICE scenario is a concrete instantiation of how this Business Risk
      materialises. Primary bridge between the SPICE and graph layers. App enforces target =
      business-level risk.'
    from_node: spice_scenario
    to_node: risk
    color: '#a93226'
    line_style: solid
    bidirectional: false
    properties: []
  caused_by:
    label: Caused By (scenario → operational risk)
    neo4j_type: CAUSED_BY
    description: 'The scenario''s cause is an existing Operational Risk in the causal graph. App
      enforces target = operational-level risk.'
    from_node: spice_scenario
    to_node: risk
    color: '#cb4335'
    line_style: dashed
    bidirectional: false
    properties: []
  assessed_against:
    label: Assessed Against (scenario → P&L perimeter)
    neo4j_type: ASSESSED_AGAINST
    core: true
    description: The financial impact of this scenario is assessed on this P&L perimeter.
    from_node: spice_scenario
    to_node: business_perimeter
    color: '#d35400'
    line_style: solid
    bidirectional: false
    properties: []
  occurs_at:
    label: Occurs At (scenario → technical perimeter)
    neo4j_type: OCCURS_AT
    description: The triggering event physically occurs at this asset or site.
    from_node: spice_scenario
    to_node: technical_perimeter
    color: '#e67e22'
    line_style: solid
    bidirectional: false
    properties: []
  contains:
    label: Contains (perimeter → business risk)
    neo4j_type: CONTAINS
    core: true
    description: 'This P&L perimeter contains this Business Risk — defines financial scope
      membership. App enforces target = business-level risk.'
    from_node: business_perimeter
    to_node: risk
    color: '#9b59b6'
    line_style: solid
    bidirectional: false
    properties: []
  addresses:
    label: Addresses (scenario → objective)
    neo4j_type: ADDRESSES
    core: true
    description: The scenario declares a mitigation objective to be fulfilled.
    from_node: spice_scenario
    to_node: mitigation_objective
    color: '#1abc9c'
    line_style: solid
    bidirectional: false
    properties: []
  fulfils:
    label: Fulfils (mitigation → objective)
    neo4j_type: FULFILS
    core: true
    description: 'A Mitigation fulfils an objective with a declared contribution weight (CR-01 —
      consolidated single Mitigation registry). Sum of weights per objective MAY exceed 100%
      (surfaced as over-coverage, not an error).'
    from_node: mitigation
    to_node: mitigation_objective
    color: '#148f77'
    line_style: solid
    bidirectional: false
    properties:
    - name: contribution_weight
      type: float
      required: false
      default: null
      description: This mitigation's contribution to the objective (% — may sum >100 per objective)
  mitigated_by:
    label: Mitigated By (scenario → mitigation)
    neo4j_type: MITIGATED_BY
    core: true
    description: 'A Mitigation is cited in this scenario''s mitigated re-assessment (CR-01 — additive
      to the objective path; consolidated single Mitigation registry). Does NOT affect graph exposure.'
    from_node: spice_scenario
    to_node: mitigation
    color: '#16a085'
    line_style: solid
    bidirectional: false
    properties: []
  stewards:
    label: Stewards (owner → mitigation)
    neo4j_type: STEWARDS
    core: true
    description: 'Execution accountability ("I am doing this work"); owner → Mitigation (CR-01 —
      consolidated single Mitigation registry). STEWARDS targeting any Risk node is forbidden by design.'
    from_node: owner
    to_node: mitigation
    color: '#7f8c8d'
    line_style: dotted
    bidirectional: false
    properties: []
  bears:
    label: Bears (owner → risk)
    neo4j_type: BEARS
    core: true
    description: 'Polymorphic consequence-bearing: OperationalRisk → technical consequence,
      BusinessRisk → financial consequence. At most one Bearer per risk.'
    from_node: owner
    to_node: risk
    color: '#566573'
    line_style: dotted
    bidirectional: false
    properties: []
