        customers — objective is to take the constellation offline (break SLAs,
        shake government confidence), not to deploy ransomware. The S1 actor.

  technical_perimeters:
    - id: TP-PLM
      name: PLM system (Teamcenter)
      type: Engineering IT
      location: Toulouse data centre
      criticality: 5
      external_id: PLM-PROD-01
      description: >-
        Product Lifecycle Management system holding satellite design master data
    # ─── Production-chain assets (W4) ──────────────────────────────────────────
    - id: TP-AIT
      name: Satellite AIT clean-room facility
      type: Manufacturing / AIT
      criticality: 5
      external_id: AIT-CR-01
      description: >-
        Assembly-Integration-Test clean room where tier-1 components are received,
        integrated into the satellite bus and qualified to the Phase-4 certification
        gate. Single integration line on the deployment critical path (ROM-04 owner:
        Plant Director). Location not pinned in canon.
    - id: TP-NOC
      name: NOC / mission control & service operations
      type: Ground segment / Mission control
      location: Denver (primary) / Dublin (backup)
      criticality: 5
      external_id: NOC-01
      description: >-
        Network Operations Centre commanding the on-orbit constellation (TT&C) and
        running the LEO broadband service (capacity allocation, provisioning). Denver
        primary / Dublin backup share an identity/PAM plane (the S1 weakness).
    # ─── Ground-segment kill-chain assets (W6 — ENH-04; 1:1 with Annex - Security Architecture §7) ─
    - id: TP-IDP
      name: Shared Denver/Dublin identity & PAM plane
      type: Identity & access management
      location: Denver / Dublin (single sign-on + common privileged-access tooling)
      criticality: 5
      external_id: IDP-01
      description: >-
        The single identity / privileged-access-management plane spanning both NOCs —
        a deliberate, realistic weakness: one compromise cascades to both sites, so
        the Dublin backup is NOT a backup against an identity-plane attack (the S1 flaw).
    - id: TP-NMS
      name: Network Management System (NMS)
      type: OT / Service management
      location: NOC (Denver primary / Dublin backup)
      criticality: 5
      external_id: NMS-01
      description: >-
        "The commercial brain" — payload reconfiguration, beam plans, capacity
        allocation and routing. A corrupt beam/capacity config pushed here trips
        fleet-wide safe-mode (S1).
    - id: TP-GW
      name: Ground gateways & secondary stations
      type: Ground segment
      location: Fairbanks, Tromsø, Singapore, Perth (+ 12 secondary)
      criticality: 4
      external_id: GW-01
      description: >-
        Gateway and secondary ground stations remotely administered from Denver
        (Dublin backup). Ransomware / IT→OT lateral movement targets (SEC-04/14).
    - id: TP-BILL
      name: Billing & provisioning platform
      type: Corporate IT / Cloud
      location: Corporate IT / cloud
      criticality: 3
      external_id: BILL-01
      description: >-
        Activates / deactivates customer terminals. Mass deactivation can mimic an
        outage at low technical cost — the S1 backup path; DDoS/API-abuse target (SEC-10).

  sponsors:
    - id: SPN-01
      name: Foreign Intelligence Agency
      description: >-
        State sponsor directing the intrusion to acquire satellite design IP
    - id: SPN-02
      name: State-aligned sponsor (government-contract contestation)
      description: >-
        State-aligned backer of the S1 disruption — motive is to deny ODT legitimate
        fleet control long enough to break SLAs and shake government confidence,
        damaging the IPO narrative. Attribution-averse (and conveniently inside the
