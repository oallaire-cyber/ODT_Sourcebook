# =============================================================================
# OBJECTIVES
# =============================================================================

objectives:

  tpo:
    - id: TPO-01
      name: "HORIZON-LEO: 48 operational satellites & $120M ARR by 2028"
      cluster: HORIZON-LEO Programme
      description: >-
        Programme revenue ramp that underpins company EBITDA breakeven
        (rolls up to TCO-01)

    - id: TPO-02
      name: Complete Phase 3 deployment by Q2 2027
      cluster: Programme Delivery
      description: >-
        Successfully deploy all 24 Phase 3 satellites to operational orbit
        with service activation

    - id: TPO-03
      name: Secure FCC full operational license by Q3 2026
      cluster: Regulatory
      description: >-
        Obtain full FCC operational license for HORIZON-LEO constellation
        including all frequency allocations

    - id: TPO-04
      name: Win first $10M+ Government contract by Q4 2026
      cluster: Commercial
      description: >-
        Secure at least one multi-year government or defense contract exceeding
        $10M ARR

    - id: TPO-05
      name: AURORA-GEO pass PDR gate by Q1 2027
      cluster: Programme Delivery
      description: >-
        Successfully pass Preliminary Design Review for AURORA-GEO relay
        satellite with all subsystem definitions at TRL 4+

    - id: TPO-06
      name: Maintain zero debris generation incidents
      cluster: Safety & Compliance
      description: >-
        Achieve and maintain zero debris generation events across entire
        constellation lifecycle, meeting IADC guidelines

  tco:
    - id: TCO-01
      name: Reach and sustain positive company EBITDA
      description: >-
        Company-wide financial objective: positive, sustained EBITDA across
        all programmes
      owner: CFO
      time_horizon: "2028"

    - id: TCO-02
      name: Maintain operating licenses & flawless safety record
      description: >-
        Company-wide license & safety objective: retain all regulatory
        authorisations and avoid safety/debris incidents
      owner: Chief Compliance Officer
      time_horizon: Ongoing

    - id: TCO-03
      name: Achieve commercial scale & customer diversification
      description: >-
        Company-wide commercial objective: diversified backlog across commercial
        and government customers
      owner: Chief Commercial Officer
      time_horizon: 2027-2029

    - id: TCO-04
      name: Achieve a successful IPO / liquidity event by H1 2029
      description: >-
