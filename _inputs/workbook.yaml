  # cost/coverage populated only where Canon states a figure.
  spice_mitigations:
    - id: SM-CYBER-INS
      name: Cyber insurance tower
      type: impact_reducing
      status: ongoing
      owner: CFO
      coverage_amount: 50.0        # Canon: $50M limit
