        launched and commissioned — the capacity that carries the service.
    - id: FT-SVC
      name: LEO broadband service
      classification: Commercial service
      description: >-
        The connectivity service ODT sells (corporate / government / wholesale telco)
        — the revenue-bearing output of the whole production chain.

