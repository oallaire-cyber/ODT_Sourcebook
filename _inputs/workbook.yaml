  scenarios:
    - id: SC-01
      name: Satellite design IP exfiltration & production halt
      annual_probability: 0.15
      ebit_impact_expected: 28.0
      recovery_days: 120
      description: >-
        Adversary exfiltrates satellite design data and corrupts the PLM,
        halting production

  entry_points:
    - id: EP-01
      name: Internet-facing engineering VPN
      exploitability: High
      description: >-
        Remote-access VPN used by engineering and suppliers, with broad
        internal reach
    - id: EP-02
      name: MSSP privileged remote access
      exploitability: High
      description: >-
        The managed-security provider's (SOC) privileged remote access into the
        ground segment — the S1 entry vector. Broad reach into the shared identity
        plane; abused via stolen/over-scoped MSSP credentials.

  attackers:
    - id: ATK-01
      name: APT-Stellar (state-sponsored)
      capability_level: 9
      description: >-
