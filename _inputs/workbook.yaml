  functional_targets:
    - id: FT-01
      name: New satellite design information
      classification: Proprietary / ITAR-controlled
      description: >-
        Master design data the adversary seeks (the attack motive)
    - id: FT-CTRL
      name: Legitimate fleet command authority (TT&C)
      classification: Mission-critical / OT
      description: >-
        Authoritative command & control of the constellation (signed TT&C). The S1
        objective: seize or deny it so the fleet trips fleet-wide safe-mode — "loss
        of legitimate control."
    # ─── Production-chain outputs (W4) ─────────────────────────────────────────
    - id: FT-COMP
      name: Qualified flight components
      classification: Flight hardware / ITAR-controlled
      description: >-
        Tier-1 supplier components qualified for flight — RF transponders (Teledyne),
        space-grade batteries (Saft), composite bus structures (Northrop/Spirit),
        attitude control (Moog/Orbital ATK). The supply-chain inputs to the build.
    - id: FT-SAT
      name: Integrated & tested satellite (flight unit)
      classification: Flight hardware / ITAR-controlled
      description: >-
        A satellite assembled, integrated and tested through the AIT line and passed
