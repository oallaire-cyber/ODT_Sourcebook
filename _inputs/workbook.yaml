# =============================================================================
# SPICE LAYER — bestiary scenarios (Pillar 5)
# =============================================================================
# Each family expands to 3 SpiceScenario nodes (best / realistic / pessimistic)
# sharing scenario_family_id. The realistic (P50, current) case is the family
# representative and carries every bridge edge (ILLUSTRATES / CAUSED_BY /
# ASSESSED_AGAINST / OCCURS_AT / ADDRESSES / MITIGATED_BY_SPICE); best and
# pessimistic are data-only sibling records read by the MagnitudeCalibrator.
#
# EBIT/FCF figures come from the bestiary stat-block tables (canon-derived):
#   03 - Bestiary/BST-*.md  →  EBIT y1..y3 and FCF y1 per case.
# Recovery: op_recovery_days from the table ("3 wks" → 21); crisis_management_days
#   left null (not in canon). fin_recovery_years from the table.
# spice_mitigation cost/coverage populated ONLY where the Canon register states a
#   figure (cyber insurance $50M limit; $60M bridge facility); others left null.
# =============================================================================

spice:
  assessment_date: "2028-02-15"      # single SPICE exercise round (State B)

  # ─── Families (each → 3 SpiceScenario cases) ───────────────────────────────
  families:

    - scenario_id: BST-S1
      family_id: "a1e6b2c0-1f47-4c8e-9b21-000000000001"
      name: NOC / Ground-Segment Compromise
      family: cyber
      cause_type: security
      cause_description: >-
        State-aligned actor takes the constellation offline long enough to break
        SLAs and shake government confidence — loss of legitimate control, not
        ransomware.
      illustrates: RH-04
      caused_by: [SEC-01, SEC-08]
      assessed_against: BP-LEO
      addresses: [MO-S1-1, MO-S1-2, MO-S1-3]
      mitigated_by: [SM-CYBER-INS, SM-CTRL-RECOVERY, SM-IDENTITY-SPLIT]
      cases:
        best:        {ebit: [-34, -5, -1],  fcf: [-60],  op_recovery_days: 14, fin_recovery_years: 2}
        realistic:   {ebit: [-54, -12, -3], fcf: [-79],  op_recovery_days: 21, fin_recovery_years: 3}
        pessimistic: {ebit: [-78, -24, -8], fcf: [-118], op_recovery_days: 42, fin_recovery_years: 3}

    - scenario_id: BST-SC1
      family_id: "a1e6b2c0-1f47-4c8e-9b21-000000000002"
      name: Supplier Build-Chain Intrusion & Production Halt
      family: supply-chain
      cause_type: security
      cause_description: >-
        Industrial-espionage / state actor compromises a tier-1 supplier, tampering
        with build integrity and exfiltrating payload IP — no outage, yet costly
        through schedule, integrity and IP.
      illustrates: RH-02
      caused_by: [SEC-02, ROE-01]
      assessed_against: BP-LEO
      occurs_at: TP-PLM
      addresses: [MO-SC1-1, MO-SC1-2, MO-SC1-3]
      mitigated_by: [SM-CLEAN-BUILD, SM-PLM-INTEGRITY]
      cases:
        best:        {ebit: [-16, -4],  fcf: [-24], fin_recovery_years: 2}
        realistic:   {ebit: [-26, -10], fcf: [-42], fin_recovery_years: 2}
        pessimistic: {ebit: [-42, -18], fcf: [-70], fin_recovery_years: 3}

    - scenario_id: BST-RG1
      family_id: "a1e6b2c0-1f47-4c8e-9b21-000000000003"
      name: Security Accreditation Suspension
      family: regulatory
      cause_type: other
      cause_description: >-
        Accrediting authority suspends the security accreditation that gates
        Government & Defense task orders — contractual from day one, no outage.
      illustrates: RH-05
      caused_by: [SEC-04]
      assessed_against: BP-LEO
      addresses: [MO-RG1-1, MO-RG1-2, MO-RG1-3]
      mitigated_by: [SM-ACCRED-ENCLAVE, SM-REVENUE-DIVERSIFY]
      cases:
        best:        {ebit: [-18, -6],     fcf: [-28], fin_recovery_years: 2}
        realistic:   {ebit: [-34, -12, -2], fcf: [-55], fin_recovery_years: 3}
        pessimistic: {ebit: [-58, -18, -4], fcf: [-90], fin_recovery_years: 3}

    - scenario_id: BST-GP1
      family_id: "a1e6b2c0-1f47-4c8e-9b21-000000000004"
      name: Export-Control Tightening & Launch Disruption
      family: geopolitical
      cause_type: geopolitical
      cause_description: >-
        Shift in the export-control / sanctions environment constrains RF supply
        and launch access — slows deployment and raises cost of capital, with no
        attacker.
      illustrates: [RH-04, RA-02]   # RA-02 added 2026-06-26 (INC-02): GP1's launch/export-control slip pressures AURORA's budget (RA-02 -> RC-02 -> FN1), giving GP1 cross-perimeter reach and aligning entry+graph with the Bestiary Index.
      # NOTE: caused_by corrected from the scaffold value [ROE-01] (software defect,
      # semantically wrong for a geopolitical/supplier scenario) to the operational
      # risks GP1's own narrative names: RF sole-source supply + launch availability.
      caused_by: [ROM-01, ROL-01]
      assessed_against: BP-LEO
      addresses: [MO-GP1-1, MO-GP1-2, MO-GP1-3]
      mitigated_by: [SM-DUAL-SOURCE]
      cases:
        best:        {ebit: [-9, -3],   fcf: [-14], fin_recovery_years: 1}
        realistic:   {ebit: [-22, -8],  fcf: [-34], fin_recovery_years: 2}
        pessimistic: {ebit: [-40, -15], fcf: [-62], fin_recovery_years: 3}

    - scenario_id: BST-FN1
      family_id: "a1e6b2c0-1f47-4c8e-9b21-000000000005"
      name: IPO Window Collapse / Distressed Raise
      family: financial
      cause_type: other
      cause_description: >-
        The convergence node: any upstream family that pushes FY2028 below plan,
        plus a closing market window, forces an emergency dilutive raise.
      hypothesis: >-
        Impact is borne via cash / cost-of-capital and the IPO valuation multiple,
        not operating EBIT; it is quantified as an FCF breach and dilution rather
        than an EBIT trajectory, so ebit_impact is set to 0 by design.
      illustrates: [RC-01, RC-02, RC-03]
      caused_by: []          # the sink — no operational cause of its own
      assessed_against: BP-LEO
      addresses: [MO-FN1-1, MO-FN1-2, MO-FN1-3]
      mitigated_by: [SM-BRIDGE-FACILITY, SM-CYBER-INS]
      cases:
        best:        {ebit: [0], fcf: [-60],  fin_recovery_years: 2}
        realistic:   {ebit: [0], fcf: [-100], fin_recovery_years: 3}
        pessimistic: {ebit: [0], fcf: [-140], fin_recovery_years: 3}

    - scenario_id: BST-GA1
      family_id: "a1e6b2c0-1f47-4c8e-9b21-000000000006"
      name: AURORA-GEO Development Overrun & Co-Funding Shock
      family: programme
      cause_type: other
      cause_description: >-
        The GEO-perimeter case: optical-ISL maturation difficulty drives a Phase
        A/B-to-C development overrun, compounded in the tail by an ESA/NASA
        co-funding/partner shock — draining ODT's cash exactly while FCF
        discipline gates the IPO. The second perimeter reaching the IPO story.
      hypothesis: >-
        AURORA-GEO is pre-revenue, so the impact is borne via FCF (incremental
        cash burn on the BP-GEO perimeter), not operating EBIT — ebit_impact is
        set to 0 by design, consistent with BP-GEO ebit_baseline 0 and the
        capitalise treatment of AURORA dev-spend (CAN-01, decided 2026-06-26).
        Cases consolidate with
        the canon FY2028 plan FCF of -40: best -46, realistic -52, pessimistic
        -64 — the pessimistic case alone breaches the -60 IPO-bridge assumption.
        operational_recovery_days encodes the PDR-gate schedule slip.
      illustrates: [RA-02, RA-04]
      caused_by: [ROE-03]
      assessed_against: BP-GEO
      addresses: [MO-GA1-1, MO-GA1-2, MO-GA1-3]
      mitigated_by: [SM-AURORA-DERISK, SM-AURORA-VARIANCE, SM-BRIDGE-FACILITY]
      cases:
        best:        {ebit: [0], fcf: [-6],  op_recovery_days: 90,  fin_recovery_years: 1}
        realistic:   {ebit: [0], fcf: [-12], op_recovery_days: 180, fin_recovery_years: 2}
        pessimistic: {ebit: [0], fcf: [-24], op_recovery_days: 365, fin_recovery_years: 3}

  # ─── Mitigation objectives (ADDRESSES targets) ─────────────────────────────
  mitigation_objectives:
    - {id: MO-S1-1,  name: "Separate Denver/Dublin identity & privileged-access planes", description: "Kill the single-plane weakness that lets one compromise trip the whole fleet."}
    - {id: MO-S1-2,  name: "Harden / segment MSSP privileged remote access", description: "Constrain the managed-service-provider entry path."}
    - {id: MO-S1-3,  name: "Pre-built clean control-plane recovery capability", description: "Cut crisis days by rebuilding control from trusted golden images."}
    - {id: MO-SC1-1, name: "Re-verification / clean-build capability for suspect units", description: "Certify which Phase-4 units are clean after suspected tampering."}
    - {id: MO-SC1-2, name: "PLM integrity monitoring & supplier access governance", description: "Detect tampering of build/test/config records early."}
    - {id: MO-SC1-3, name: "IP-segmentation of payload design data", description: "Limit blast radius of design-data exfiltration."}
    - {id: MO-RG1-1, name: "Maintain accreditation enclave integrity (audited, isolated)", description: "Keep the accredited environment defensibly separate."}
    - {id: MO-RG1-2, name: "Pre-cleared remediation playbook to shorten suspension", description: "Reduce the duration of any accreditation freeze."}
    - {id: MO-RG1-3, name: "Diversify revenue away from 30% government concentration", description: "Reduce single-segment dependency (supports TCO-03)."}
    - {id: MO-GP1-1, name: "Dual-source RF components & multi-launcher strategy", description: "Remove single points of geopolitical supply failure."}
    - {id: MO-GP1-2, name: "Export-control compliance & scenario monitoring", description: "Forecast and pre-empt policy shifts (governance posture — no purchasable control)."}
    - {id: MO-GP1-3, name: "Geographic supplier diversification", description: "Spread supply across jurisdictions."}
    - {id: MO-FN1-1, name: "Hold FY2028 FCF above the -$100M liquidity trigger", description: "Every upstream mitigation ultimately feeds this."}
    - {id: MO-FN1-2, name: "Pre-arranged bridge financing & insurance that actually pays", description: "Liquidity that survives a war/state-actor exclusion dispute."}
    - {id: MO-FN1-3, name: "Quantified, disclosed risk in the IPO file", description: "Diane's lever — disclosure rather than a purchasable control."}
    - {id: MO-GA1-1, name: "De-risk optical ISL to TRL 4+ ahead of the PDR gate", description: "Retire the technology-maturation cost/schedule driver (RA-03/ROE-03) before it forces an overrun."}
    - {id: MO-GA1-2, name: "Hold AURORA spend within the company FCF envelope", description: "Stage-gate funding + variance control so a GEO overrun does not push consolidated FCF through the -$60M IPO-bridge assumption."}
    - {id: MO-GA1-3, name: "Secure ESA/NASA co-funding continuity & partner commitment", description: "Governance/relationship objective against partner withdrawal (RA-04) — no purchasable control (deliberate coverage gap)."}

