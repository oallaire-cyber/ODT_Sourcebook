      status: planned
      owner: CISO
      cost_capex: 4.0            # Canon: ~$4M one-time (S1 control pricing, ENH-06)
      description: Break the shared identity/privileged-access plane so one compromise cannot trip the fleet.
      fulfils:
        - {objective: MO-S1-1, contribution_weight: 100.0}
        - {objective: MO-S1-2, contribution_weight: 40.0}
