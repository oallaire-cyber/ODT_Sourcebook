    - {id: MO-SC1-2, name: "PLM integrity monitoring & supplier access governance", description: "Detect tampering of build/test/config records early."}
    - {id: MO-SC1-3, name: "IP-segmentation of payload design data", description: "Limit blast radius of design-data exfiltration."}
    - {id: MO-RG1-1, name: "Maintain accreditation enclave integrity (audited, isolated)", description: "Keep the accredited environment defensibly separate."}
    - {id: MO-RG1-2, name: "Pre-cleared remediation playbook to shorten suspension", description: "Reduce the duration of any accreditation freeze."}
    - {id: MO-RG1-3, name: "Diversify revenue away from 30% government concentration", description: "Reduce single-segment dependency (supports TCO-03)."}
    - {id: MO-GP1-1, name: "Dual-source RF components & multi-launcher strategy", description: "Remove single points of geopolitical supply failure."}
    - {id: MO-GP1-2, name: "Export-control compliance & scenario monitoring", description: "Forecast and pre-empt policy shifts (governance posture — no purchasable control)."}
    - {id: MO-GP1-3, name: "Geographic supplier diversification", description: "Spread supply across jurisdictions."}
    - {id: MO-FN1-1, name: "Hold FY2028 FCF above the -$100M liquidity trigger", description: "Every upstream mitigation ultimately feeds this."}
