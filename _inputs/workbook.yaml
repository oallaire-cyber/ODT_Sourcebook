# =============================================================================
# SPICE LAYER — bestiary scenarios (Pillar 5)
# =============================================================================
# Each family expands to 3 SpiceScenario nodes (best / realistic / pessimistic)
# sharing scenario_family_id. The realistic (P50, current) case is the family
# representative and carries every bridge edge (ILLUSTRATES / CAUSED_BY /
# ASSESSED_AGAINST / OCCURS_AT / ADDRESSES / MITIGATED_BY); best and
# pessimistic are data-only sibling records read by the MagnitudeCalibrator.
# A family may also declare a `mitigated:` block — the analyst-authored mitigated
# re-assessment as a new version_number per case (CR-01 §C4); see BST-S1.
#
# EBIT/FCF figures come from the bestiary stat-block tables (canon-derived):
#   03 - Bestiary/BST-*.md  →  EBIT y1..y3 and FCF y1 per case.
# Recovery: op_recovery_days from the table ("3 wks" → 21); crisis_management_days
#   left null (not in canon). fin_recovery_years from the table.
# Control cost/coverage (now core `Mitigation` nodes, CR-01) populated ONLY where the
#   Canon register states a figure (cyber insurance $50M limit; $60M bridge facility).
# =============================================================================

spice:
  assessment_date: "2028-02-15"      # single SPICE exercise round (State B)

  # ─── Families (each → 3 SpiceScenario cases) ───────────────────────────────
  families:

    - scenario_id: BST-S1
      family_id: "a1e6b2c0-1f47-4c8e-9b21-000000000001"
      name: NOC / Ground-Segment Compromise
      family: cyber
      cause_type: security
      cause_description: >-
        State-aligned actor takes the constellation offline long enough to break
        SLAs and shake government confidence — loss of legitimate control, not
        ransomware.
      illustrates: RC-05   # corrected 2026-06-30 (supersedes the scaffold RH-04): a NOC/ground-segment outage materialises as reputational harm — RC-05's definition explicitly covers "service outage" — not market commoditisation (RH-04, a market-structure risk). Convergence preserved: RC-05 -> RC-03 (INF-28) -> TCO-04 (IMC-06) keeps S1 on the IPO apex; RC-05 -> TPO-04 (IMP-09) carries the government-confidence thread. INF-15 (SEC-01 -> RC-05) already backs the cyber->reputational cause path.
      caused_by: [SEC-01, SEC-08]
      assessed_against: BP-LEO
      occurs_at: TP-NOC               # W6: the triggering event occurs at the NOC / ground segment
      addresses: [MO-S1-1, MO-S1-2, MO-S1-3]
      mitigated_by: [SM-CYBER-INS, SM-CTRL-RECOVERY, SM-IDENTITY-SPLIT]
      cases:
        best:        {ebit: [-34, -5, -1],  fcf: [-60],  op_recovery_days: 14, fin_recovery_years: 2}
        realistic:   {ebit: [-54, -12, -3], fcf: [-79],  op_recovery_days: 21, fin_recovery_years: 3}
        pessimistic: {ebit: [-78, -24, -8], fcf: [-118], op_recovery_days: 42, fin_recovery_years: 3}
      # ── CR-01 §C4 — projected mitigated re-assessment (realises DM-01's "after") ──
      # The two S1 cyber controls are `planned` (un-capitalised), so this is a
      # PROJECTION: base v1 stays `current`, this version is `draft` ("benefit if
      # funded"). On funding/deployment the analyst flips base→superseded, this→current.
      # Benefit = base − mitigated (computed by RIM per CR-01 §C5); ROCE denominator =
      # Σ committed_budget of the cited controls = SM-IDENTITY-SPLIT 4.0 + SM-CTRL-RECOVERY 1.5 = 5.5.
      # SM-CYBER-INS is in `mitigated_by` (citation) but contributes ~0 to the projection:
      # the $50M tower carries a war/state-actor exclusion and S1's modelled actor is state-aligned.
      # Owner-confirmed numbers (Moderate-strong), 2026-06-29.
      mitigated:
        version_number: 2
        status_in_family: draft         # projection until the controls are funded
        cites: [SM-IDENTITY-SPLIT, SM-CTRL-RECOVERY]
        note: >-
          Projected S1 with the two planned cyber controls funded (identity/PAM plane
          separation + clean control-plane recovery). Pessimistic FCF held above the
          -$100M liquidity trigger (-82 vs -118 base); the S1 → FN1 path is severed.
          Benefit vs base: FCF +22/+25/+36 (best/realistic/pessimistic).
        cases:
          best:        {ebit: [-20, -3],      fcf: [-38], op_recovery_days: 6,  fin_recovery_years: 1}
          realistic:   {ebit: [-32, -8],      fcf: [-54], op_recovery_days: 9,  fin_recovery_years: 2}
          pessimistic: {ebit: [-46, -14, -4], fcf: [-82], op_recovery_days: 16, fin_recovery_years: 2}

