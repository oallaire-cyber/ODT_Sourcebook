      fulfils:
        - {objective: MO-RG1-1, contribution_weight: 70.0}
        - {objective: MO-RG1-2, contribution_weight: 60.0}
    - id: SM-DUAL-SOURCE
      name: RF dual-source + multi-launcher framework
      type: impact_reducing
      status: ongoing
      owner: VP Manufacturing & Supply Chain
      description: >-
        Pre-negotiated second-source RF framework and multi-launcher slots
        (financial-layer counterpart of MIT-01 / MIT-02) plus buffer stock.
      fulfils:
        - {objective: MO-GP1-1, contribution_weight: 80.0}
        - {objective: MO-GP1-3, contribution_weight: 50.0}
    - id: SM-BRIDGE-FACILITY
      name: Committed bridge financing facility
      type: impact_reducing
      status: ongoing
      owner: CFO
      coverage_amount: 60.0        # Canon: $60M facility alongside $85M cash (State B)
      description: Drawable facility to hold FCF above the -$100M trigger ahead of the IPO.
      fulfils:
        - {objective: MO-FN1-1, contribution_weight: 70.0}
        - {objective: MO-FN1-2, contribution_weight: 40.0}
    - id: SM-REVENUE-DIVERSIFY
