    - id: SUP-03
      name: Northrop Grumman
      tier: Tier 1
      criticality: Important
      single_source: false
      country: United States
      description: >-
        Composite satellite bus structures (ROM-03) — dual-sourced with Spirit AeroSystems.
    - id: SUP-04
      name: Spirit AeroSystems
      tier: Tier 1
      criticality: Important
      single_source: false
      country: United States
      description: >-
        Composite satellite bus structures — the second qualified source alongside
        Northrop Grumman (ROM-03).
    - id: SUP-05
      name: Moog
      tier: Tier 1
      criticality: Important
      single_source: false
      country: United States
      description: >-
        Attitude-control / propulsion components — dual-sourced with Orbital ATK.
    - id: SUP-06
      name: Orbital ATK
      tier: Tier 1
      criticality: Important
      single_source: false
      country: United States
      description: >-
        Attitude-control / propulsion components — the second source alongside Moog.
    - id: SUP-07
      name: SpaceX
      tier: Tier 1
      criticality: Important
      single_source: false
      country: United States
      description: >-
        Launch services (Falcon 9) — primary manifest provider feeding BA-LAUNCH (ROL-01).
    - id: SUP-08
      name: Rocket Lab
      tier: Tier 1
      criticality: Important
      single_source: false
      country: United States
      description: >-
        Launch services (Electron) — diversification provider for BA-LAUNCH (ROL-01).

  # ─── External regulators / regimes (CR-02) ──────────────────────────────────
  # Shared constraint nodes. node_type 'regulator'.
  # Fields: name, kind {regulator/export_control/accreditation/partnership},
